name: "Deploy Dev Infrastructure"
on:
  push: # TODO: restrict to main once testing is complete
    branches:
      - "**"
  pull_request:
    branches:
      - "main"

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: "ubuntu-latest"
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: install terraform
        uses: hashicorp/setup-terraform@v4
      - name: terraform init
        run: terraform -chdir=infrastructure/environments/dev init -backend-config=dev.tfbackend
      - name: terraform plan
        run: terraform -chdir=infrastructure/environments/dev plan -var-file=dev.tfvars

  apply:
    name: "Terraform Apply"
    runs-on: "ubuntu-latest"
    needs: [plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: install terraform
        uses: hashicorp/setup-terraform@v4
      - name: terraform init
        run: terraform -chdir=infrastructure/environments/dev init -backend-config=dev.tfbackend
      - name: terraform apply
        run: terraform -chdir=infrastructure/environments/dev apply -auto-approve -var-file=dev.tfvars

