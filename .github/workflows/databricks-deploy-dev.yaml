name: Asset Bundle — Deploy or Destroy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - destroy
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa

jobs:
  # ── Approval gate ──────────────────────────────────────────────
  # This job targets the GitHub Environment, which has a
  # "Required reviewers" protection rule configured in your repo settings.
  # The workflow pauses here until an approved reviewer clicks Approve.
  # As its only dev we will auto-approve to speed up testing, but in a team setting this is where you would have your reviewers approve the deployment.
  await-approval:
    name: Await approval
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}   # triggers the gate
    steps:
      - name: Log intent
        run: |
          echo "Action   : ${{ github.event.inputs.action }}"
          echo "Env      : ${{ github.event.inputs.environment }}"
          echo "Requested by: ${{ github.actor }}"

  # Deploy
  deploy:
    name: Deploy bundle
    runs-on: ubuntu-latest
    needs: await-approval
    if: github.event.inputs.action == 'deploy'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r asset_bundles/requirements.txt

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy asset bundle
        working-directory: asset_bundles
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: databricks bundle deploy -t ${{ github.event.inputs.environment }}

      - name: Post deployment summary
        run: |
          echo "### ✅ Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Approved by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # Destroy
  destroy:
    name: Destroy bundle
    runs-on: ubuntu-latest
    needs: await-approval
    if: github.event.inputs.action == 'destroy'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r asset_bundles/requirements.txt

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Destroy asset bundle
        working-directory: asset_bundles
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run:
          databricks bundle destroy -t ${{ github.event.inputs.environment }}

      - name: Post destroy summary
        run: |
          echo "### 🗑️ Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Approved by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
